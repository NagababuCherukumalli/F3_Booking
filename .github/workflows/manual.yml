name: F3_Booking

on:
  schedule:
    - cron: '* * * * *'
    - cron: '*/05 * * * *'

jobs:
  runtests:
    runs-on: ubuntu-latest
    concurrency: 
      group: srp-job
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v2

      - name: Cache Maven dependencies 
        uses: actions/cache@v2
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Set up Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox

      - name: Download geckodriver
        run: |
          GECKODRIVER_VERSION=$(curl -sS https://api.github.com/repos/mozilla/geckodriver/releases/latest | grep 'tag_name' | cut -d\" -f4)
          wget -N https://github.com/mozilla/geckodriver/releases/download/$GECKODRIVER_VERSION/geckodriver-$GECKODRIVER_VERSION-linux64.tar.gz
          tar -xzf geckodriver-$GECKODRIVER_VERSION-linux64.tar.gz
          sudo mv geckodriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/geckodriver

      - name: Set up Maven
        run: |
          sudo apt-get install -y maven

      - name: Build with Maven
        run: |
          mvn test
